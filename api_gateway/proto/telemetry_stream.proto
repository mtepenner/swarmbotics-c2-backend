syntax = "proto3";

package swarmbotics.c2.v1;

option go_package = "github.com/mtepenner/swarmbotics-c2-backend/api_gateway/proto/c2v1;c2v1";

message TelemetryEnvelope {
  string vehicle_id = 1;
  string mission_id = 2;
  string timestamp = 3;
  double latitude = 4;
  double longitude = 5;
  double battery_percent = 6;
  string payload_mode = 7;
  map<string, string> attributes = 8;
}

message TelemetryAck {
  int32 accepted_samples = 1;
  string cursor = 2;
}

message TelemetryRequest {
  string mission_id = 1;
  repeated string vehicle_ids = 2;
}

service TelemetryStream {
  rpc Publish(stream TelemetryEnvelope) returns (TelemetryAck);
  rpc Subscribe(TelemetryRequest) returns (stream TelemetryEnvelope);
}