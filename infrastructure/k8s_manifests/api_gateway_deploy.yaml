apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/mtepenner/swarmbotics-c2-backend/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
              name: grpc
            - containerPort: 8080
              name: rest
          env:
            - name: JWT_AUDIENCE
              value: swarmbotics-c2
            - name: REDIS_ADDR
              value: redis-live-state:6379
            - name: TELEMETRY_TOPIC
              value: swarm.telemetry
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - name: grpc
      port: 8443
      targetPort: grpc
    - name: rest
      port: 8080
      targetPort: rest