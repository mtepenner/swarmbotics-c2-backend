apiVersion: v1
kind: Service
metadata:
  name: swarm-planner
spec:
  clusterIP: None
  selector:
    app: swarm-planner
  ports:
    - name: planner
      port: 9000
      targetPort: planner
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: swarm-planner
spec:
  serviceName: swarm-planner
  replicas: 2
  selector:
    matchLabels:
      app: swarm-planner
  template:
    metadata:
      labels:
        app: swarm-planner
    spec:
      containers:
        - name: swarm-planner
          image: ghcr.io/mtepenner/swarmbotics-c2-backend/swarm-planner:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
              name: planner
          env:
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: REDIS_ADDR
              value: redis-live-state:6379
            - name: TIMESCALE_DSN
              value: postgresql://timescale:timescale@timescaledb:5432/mission_metrics